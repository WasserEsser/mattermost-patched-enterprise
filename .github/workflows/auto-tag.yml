name: Auto-tag new Mattermost releases

on:
  schedule:
    # Check daily at 2am UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mattermost_tag:
        description: 'Specific Mattermost image tag to test (e.g. 11.8.2)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  check-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Fetch existing tags
        id: existing
        run: |
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          git tag -l '1[0-9].*' | sort -V >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Discover new Mattermost tags
        id: discover
        # Uses the GitHub Releases API (authenticated via GITHUB_TOKEN) instead
        # of the Docker Hub web API, which is shared across all GitHub Actions
        # runners and frequently returns 429s during nightly runs.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # If a specific tag was provided manually, use only that
          if [ -n "${{ inputs.mattermost_tag }}" ]; then
            echo "new_tags=${{ inputs.mattermost_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXISTING="${{ steps.existing.outputs.tags }}"

          # Fetch stable releases from GitHub API. This is authenticated via
          # GITHUB_TOKEN so it gets 5,000 req/hr — never rate limited from
          # within GitHub Actions. Fetches enough pages to cover many releases.
          ALL_TAGS=$(curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/mattermost/mattermost/releases?per_page=50" \
            | python3 -c "
          import sys, json
          releases = json.load(sys.stdin)
          for r in releases:
              # Skip prereleases and drafts
              if r.get('prerelease') or r.get('draft'):
                  continue
              tag = r['tag_name'].lstrip('v')
              # Stable semver only: X.Y.Z with all numeric parts
              parts = tag.split('.')
              if len(parts) == 3 and all(p.isdigit() for p in parts):
                  print(tag)
          ")

          if [ -z "$ALL_TAGS" ]; then
            echo "No stable Mattermost releases found from GitHub API"
            exit 1
          fi

          # Find tags that don't exist in our repo yet
          NEW_TAGS=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            if ! echo "$EXISTING" | grep -qx "$tag"; then
              NEW_TAGS="${NEW_TAGS}${NEW_TAGS:+, }${tag}"
            fi
          done <<< "$(echo "$ALL_TAGS" | sort -V -r)"

          echo "new_tags=${NEW_TAGS}" >> "$GITHUB_OUTPUT"
          echo "Discovered new tags: ${NEW_TAGS:-none}"

      - name: Build and tag
        if: steps.discover.outputs.new_tags != ''
        id: build
        run: |
          set -uo pipefail

          IFS=', ' read -ra TAGS <<< "${{ steps.discover.outputs.new_tags }}"

          SUCCEEDED=""
          FAILED=""
          SKIPPED=""

          for TAG in "${TAGS[@]}"; do
            echo "=== Testing Mattermost ${TAG} ==="

            # Verify the image tag exists on Docker Hub before attempting build.
            # This is a single targeted call (not paginated) so it's fine to use
            # the Hub web API here — it only runs when a new release is found.
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://hub.docker.com/v2/repositories/mattermost/mattermost-enterprise-edition/tags/${TAG}")
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Tag ${TAG} does not exist on Docker Hub yet (HTTP ${HTTP_CODE}), skipping"
              SKIPPED="${SKIPPED}${SKIPPED:+, }${TAG}"
              continue
            fi

            if docker build --build-arg MATTERMOST_IMAGE_TAG="${TAG}" -t mm-test:"${TAG}" . ; then
              SUCCEEDED="${SUCCEEDED}${SUCCEEDED:+, }${TAG}"
              git tag "${TAG}" HEAD
              echo "Tagged ${TAG} on $(git rev-parse --short HEAD)"
            else
              FAILED="${FAILED}${FAILED:+, }${TAG}"
              echo "Build failed for ${TAG}"
            fi
          done

          # Push all new tags
          if [ -n "$SUCCEEDED" ]; then
            IFS=', ' read -ra SUCC_TAGS <<< "$SUCCEEDED"
            for TAG in "${SUCC_TAGS[@]}"; do
              git push origin "${TAG}"
            done
          fi

          echo "succeeded=${SUCCEEDED}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "skipped=${SKIPPED}" >> "$GITHUB_OUTPUT"

      - name: Notify on discover failure
        # Fires when the discover step itself fails — previously silent
        if: failure() && steps.discover.outcome == 'failure'
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: |
          curl -sf -X POST "https://api.pushover.net/1/messages.json" \
            -d "token=${PUSHOVER_TOKEN}" \
            -d "user=${PUSHOVER_USER}" \
            -d "title=Mattermost tagger: discovery failed" \
            -d "message=Failed to discover new Mattermost releases. Check the Actions log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "priority=0"

      - name: Notify on build failure
        if: steps.build.outputs.failed != ''
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: |
          FAILED="${{ steps.build.outputs.failed }}"
          SUCCEEDED="${{ steps.build.outputs.succeeded }}"

          TITLE="Mattermost patcher: pattern not found"
          MESSAGE=$(printf "Failed to patch: %s" "$FAILED")
          if [ -n "$SUCCEEDED" ]; then
            MESSAGE=$(printf "%s\n\nSuccessfully tagged: %s" "$MESSAGE" "$SUCCEEDED")
          fi
          MESSAGE=$(printf "%s\n\nAction needed: update patch.sh pattern for the failing version(s).\nRepo: %s" "$MESSAGE" "${{ github.repository }}")

          curl -sf -X POST "https://api.pushover.net/1/messages.json" \
            -d "token=${PUSHOVER_TOKEN}" \
            -d "user=${PUSHOVER_USER}" \
            -d "title=${TITLE}" \
            -d "message=${MESSAGE}" \
            -d "priority=-1"
